<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&amp;display=swap');
      .text { font-family: 'Bricolage Grotesque', sans-serif; font-size: 68px; font-weight: 800; font-style: italic; fill: #191b25; }
      .text-white { fill: #ffffff; }
      .card { stroke: #191b25; stroke-width: 6; }
      .shadow { fill: #191b25; }
    </style>
  </defs>
  
  <!-- Card 1 Shadow & Blue Card -->
  <g transform="translate(60, 40) rotate(-10)">
    <rect x="8" y="8" width="120" height="140" rx="16" class="shadow"/>
    <rect x="0" y="0" width="120" height="140" rx="16" fill="#003ec7" class="card"/>
  </g>

  <!-- Card 2 Shadow & Yellow Card -->
  <g transform="translate(220, 30) rotate(15)">
    <rect x="8" y="8" width="120" height="140" rx="16" class="shadow"/>
    <rect x="0" y="0" width="120" height="140" rx="16" fill="#caa900" class="card"/>
  </g>

  <!-- Center Card Shadow & Pink Card -->
  <g transform="translate(110, 50) rotate(0)">
    <rect x="8" y="8" width="180" height="100" rx="16" class="shadow"/>
    <rect x="0" y="0" width="180" height="100" rx="16" fill="#ab008f" class="card"/>
  </g>

  <!-- Text -->
  <text x="200" y="125" class="text text-white" text-anchor="middle" style="text-shadow: 4px 4px 0px #191b25;">FICTIO</text>
</svg>
