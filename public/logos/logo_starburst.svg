<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&amp;display=swap');
      .text { font-family: 'Bricolage Grotesque', sans-serif; font-size: 80px; font-weight: 800; font-style: italic; fill: #191b25; }
      .bg { fill: #003ec7; stroke: #191b25; stroke-width: 8; stroke-linejoin: round; }
      .shadow { fill: #191b25; }
      .text-bg { fill: #ffe170; stroke: #191b25; stroke-width: 6; }
    </style>
  </defs>
  
  <g transform="translate(200,200)">
    <!-- Shadow -->
    <path class="shadow" transform="translate(12,12)" d="M0 -150 L35 -40 L140 -40 L60 25 L90 130 L0 65 L-90 130 L-60 25 L-140 -40 L-35 -40 Z" />
    <!-- Starburst -->
    <path class="bg" d="M0 -150 L35 -40 L140 -40 L60 25 L90 130 L0 65 L-90 130 L-60 25 L-140 -40 L-35 -40 Z" />
    
    <!-- Text badge shadow & bg -->
    <rect x="-140" y="-30" width="280" height="90" rx="20" class="shadow" transform="translate(8,8) rotate(-5)" />
    <rect x="-140" y="-30" width="280" height="90" rx="20" class="text-bg" transform="rotate(-5)" />
    
    <!-- Text -->
    <text x="0" y="32" class="text" text-anchor="middle" transform="rotate(-5)">FICTIO</text>
  </g>
</svg>
