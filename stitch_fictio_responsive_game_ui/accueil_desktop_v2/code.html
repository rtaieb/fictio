<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fictio - Accueil</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

          darkMode: "class",
          theme: {
            extend: {

                      "on-error-container": "#93000a",

                      "tertiary-container": "#caa900",

                      "inverse-on-surface": "#f0effe",
                      "on-surface-variant": "#434656",
                      "secondary-fixed-dim": "#ffade2",
                      "surface": "#fbf8ff",
                      "on-primary-fixed-variant": "#0038b6",
                      "tertiary-fixed": "#ffe170",
                      "on-tertiary-container": "#4c3f00",
                      "on-tertiary": "#ffffff",
                      "surface-dim": "#d9d9e7",
                      "on-tertiary-fixed-variant": "#544600",
                      "primary-container": "#0052ff",
                      "error-container": "#ffdad6",
                      "inverse-surface": "#2e303a",
                      "outline-variant": "#c3c5d9",
                      "on-primary-container": "#dfe3ff",

                      "tertiary": "#705d00",
                      "on-secondary-fixed": "#3b002f",
                      "on-primary": "#ffffff",
                      "surface-container": "#ededfb",
                      "on-error": "#ffffff",
                      "inverse-primary": "#b7c4ff",
                      "on-primary-fixed": "#001452",
                      "secondary-fixed": "#ffd8ee",
                      "surface-container-lowest": "#ffffff",
                      "outline": "#737688",
                      "on-secondary-fixed-variant": "#86006f",
                      "on-secondary-container": "#fffbff",

<style>
        body {
            background: linear-gradient(135deg, #f8f9fc 0%, #ffffff 100%);
            color: #191b25;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle Geometric Pattern Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.4;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 76, 237, 0.05) 0%, transparent 8%),
                radial-gradient(circle at 90% 10%, rgba(171, 0, 143, 0.05) 0%, transparent 10%),
                radial-gradient(circle at 50% 50%, rgba(255, 225, 112, 0.03) 0%, transparent 15%),
                radial-gradient(circle at 80% 80%, rgba(0, 76, 237, 0.04) 0%, transparent 12%),
                radial-gradient(circle at 15% 85%, rgba(171, 0, 143, 0.03) 0%, transparent 8%);
        }

        /* Floating elements for extra depth */
        .bg-shape {
            position: fixed;
            z-index: -1;
            opacity: 0.08;
            pointer-events: none;
        }

        .btn-brutal {
            border: 3px solid #000000;
            box-shadow: 4px 4px 0px 0px #000000;
            transition: all 0.1s ease-in-out;
            min-height: 64px;
        }

        .btn-brutal:active {
            box-shadow: 0px 0px 0px 0px #000000;
            transform: translate(4px, 4px);
        }

        .input-brutal {
            border: 3px solid #000000;
            border-radius: 9999px;
            transition: all 0.2s ease;
            background-color: #ffffff;
        }

        .input-brutal:focus {
            outline: none;
            border-color: #0052ff;
            background-color: #f3f2ff;
        }
        
        .neon-aura-pink {
            box-shadow: 0 0 0 4px #ab008f;
        }
        .neon-aura-blue {
            box-shadow: 0 0 0 4px #0052ff;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-body-md">
<!-- Scattered background shapes -->
<div class="bg-shape top-[10%] left-[5%] w-32 h-32 border-2 border-primary rounded-full rotate-12"></div>
<div class="bg-shape top-[60%] right-[10%] w-24 h-24 bg-secondary rounded-lg -rotate-12"></div>
<div class="bg-shape bottom-[15%] left-[12%] w-16 h-16 border-2 border-tertiary rotate-45"></div>
<div class="bg-shape top-[20%] right-[25%] w-8 h-8 rounded-full bg-primary-container"></div>
<div class="bg-shape bottom-[40%] right-[5%] w-20 h-20 border-2 border-secondary rounded-full"></div>
<main class="flex-grow flex flex-col items-center justify-center p-container-margin w-full max-w-4xl mx-auto space-y-12">
<!-- Giant Logo Centerpiece -->
<div class="text-center w-full max-w-md mx-auto relative group">
<!-- Decorative background elements -->
<div class="absolute -top-10 -left-10 w-20 h-20 bg-tertiary-fixed rounded-full border-3 border-black shadow-[4px_4px_0_0_#000000] -z-10 group-hover:scale-110 transition-transform duration-300"></div>
<div class="absolute -bottom-6 -right-6 w-16 h-16 bg-primary-fixed rounded-none border-3 border-black shadow-[4px_4px_0_0_#000000] rotate-12 -z-10 group-hover:-rotate-12 transition-transform duration-300"></div>
<h1 class="font-display-lg md:font-display-lg text-display-lg-mobile md:text-display-lg text-primary italic uppercase tracking-tighter" style="-webkit-text-stroke: 2px #000; text-shadow: 6px 6px 0px #000;">
                FICTIO
            </h1>
<p class="font-label-bold text-label-bold text-on-surface mt-unit tracking-widest uppercase">
                Le jeu de bluff ultime
            </p>
</div>
<!-- Action Area -->
<div class="w-full max-w-md space-y-8 bg-white border-[3px] border-black p-card-padding rounded-lg shadow-[8px_8px_0_0_#000000] relative">
<!-- Create Game Button (Neon Pink) -->
<div class="w-full">
<button class="w-full flex items-center justify-center space-x-2 bg-secondary text-on-secondary rounded-full font-headline-sm text-headline-sm px-6 py-4 btn-brutal">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span>Créer une partie</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center space-x-4 my-6">
<div class="flex-grow h-[3px] bg-black"></div>
<span class="font-label-bold text-label-bold text-on-surface uppercase">OU</span>
<div class="flex-grow h-[3px] bg-black"></div>
</div>
<!-- Join Game Section -->
<div class="w-full space-y-4">
<label class="block font-headline-sm text-headline-sm text-center" for="room-code">
                    Rejoindre une salle
                </label>
<div class="flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4">
<!-- 4 Letter Code Input -->
<input class="flex-grow input-brutal text-center font-display-lg text-display-lg-mobile uppercase tracking-widest px-4 py-3 placeholder:text-outline-variant" id="room-code" maxlength="4" placeholder="CODE" style="min-height: 64px;" type="text"/>
<!-- Join Button (Electric Blue) -->
<button class="md:w-32 flex items-center justify-center bg-primary-container text-on-primary-container rounded-full font-headline-sm text-headline-sm px-6 py-4 btn-brutal shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">login</span>
</button>
</div>
</div>
</div>
</main>
<script>
        // Auto-uppercase and filter input to letters only
        const roomCodeInput = document.getElementById('room-code');
        roomCodeInput.addEventListener('input', function(e) {
            this.value = this.value.toUpperCase().replace(/[^A-Z]/g, '');
        });
    </script>
</body></html>
